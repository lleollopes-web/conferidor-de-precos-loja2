<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Conferidor de Preços</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --papel: #F6F4EE;
    --cartao: #FFFFFF;
    --tinta: #16191C;
    --tinta-suave: #5C6268;
    --linha: #E1DDD2;
    --laser: #E13A2B;
    --sucesso: #1E7A54;
    --sombra-1: 0 1px 2px rgba(20, 20, 15, 0.04);
    --sombra-2: 0 10px 30px rgba(20, 20, 15, 0.06);
    --raio: 14px;
    --display: 'Space Grotesk', system-ui, sans-serif;
    --texto: 'Inter', system-ui, -apple-system, sans-serif;
    --mono: 'IBM Plex Mono', 'Courier New', monospace;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    height: 100%;
    background: var(--papel);
    color: var(--tinta);
    font-family: var(--texto);
    overflow-x: hidden;
  }

  .tela {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 20px 32px;
  }

  header {
    width: 100%;
    max-width: 440px;
    text-align: left;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .marca-icone {
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: var(--tinta);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .marca-icone svg { width: 24px; height: 24px; }
  .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--laser);
    margin: 0 0 4px;
  }
  h1 {
    font-family: var(--display);
    font-weight: 700;
    font-size: 26px;
    margin: 0;
    letter-spacing: -0.01em;
    line-height: 1.15;
  }

  /* Seletor de loja */
  .seletor-loja {
    width: 100%;
    max-width: 440px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 18px;
  }
  .botao-loja {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 20px 12px;
    border-radius: 12px;
    border: 2px solid var(--linha);
    background: var(--cartao);
    cursor: pointer;
    box-shadow: var(--sombra-1);
    transition: border-color 0.15s ease, transform 0.15s ease;
  }
  .botao-loja:active { transform: scale(0.98); }
  .botao-loja.selecionada { border-color: var(--tinta); }
  .botao-loja img {
    height: 48px;
    max-width: 90%;
    object-fit: contain;
  }
  .botao-loja .rotulo-loja {
    font-family: var(--texto);
    font-size: 14px;
    font-weight: 700;
    color: var(--tinta-suave);
  }
  .botao-loja.selecionada .rotulo-loja { color: var(--tinta); }

  /* Faixa de status do catálogo */
  .status-catalogo {
    width: 100%;
    max-width: 440px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    padding: 12px 16px;
    border-radius: 10px;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: var(--sombra-1);
  }
  .status-catalogo.carregando { background: #EFEBDF; color: var(--tinta-suave); }
  .status-catalogo.pronto { background: #E5F2EA; color: var(--sucesso); }
  .status-catalogo.erro { background: #FBEAE7; color: var(--laser); }

  /* Área da câmera / viewfinder */
  .visor {
    width: 100%;
    max-width: 440px;
    height: clamp(200px, 32vh, 340px);
    background: #101214;
    border-radius: var(--raio);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--sombra-2);
  }
  #leitor { width: 100%; height: 100%; position: relative; }
  #leitor video, #leitor canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100% !important;
    height: 100% !important;
    object-fit: cover;
  }
  #leitor canvas.drawingBuffer { display: none; }

  .moldura {
    position: absolute;
    inset: 16%;
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 12px;
    pointer-events: none;
    display: none;
  }
  .visor.ativo .moldura { display: block; }
  .visor.ativo .laser-linha {
    display: block;
    position: absolute;
    left: 16%;
    right: 16%;
    top: 16%;
    height: 2px;
    background: var(--laser);
    box-shadow: 0 0 10px var(--laser);
    animation: varrer 1.6s ease-in-out infinite;
  }
  .laser-linha { display: none; }
  @keyframes varrer {
    0%   { top: 16%; }
    50%  { top: 80%; }
    100% { top: 16%; }
  }

  .estado-inicial {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    color: rgba(255,255,255,0.5);
    font-family: var(--mono);
    font-size: 13px;
    text-align: center;
    padding: 0 30px;
    line-height: 1.6;
  }

  /* Botão principal */
  .botao-principal {
    width: 100%;
    max-width: 440px;
    margin-top: 20px;
    padding: 17px;
    border: none;
    border-radius: 12px;
    background: var(--tinta);
    color: #fff;
    font-family: var(--texto);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.01em;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    box-shadow: var(--sombra-1);
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .botao-principal svg { width: 19px; height: 19px; }
  .botao-principal:disabled { background: #C7C3B8; cursor: not-allowed; }
  .botao-principal:active:not(:disabled) { transform: scale(0.98); }
  .botao-principal.parar { background: var(--laser); }

  /* Etiqueta de resultado */
  .etiqueta-preco {
    width: 100%;
    max-width: 440px;
    max-height: 0;
    margin-top: 0;
    padding: 0 26px;
    overflow: hidden;
    background: var(--cartao);
    border-radius: var(--raio);
    box-shadow: var(--sombra-2);
    opacity: 0;
    transition: max-height 0.34s cubic-bezier(.2,.8,.3,1.2), opacity 0.3s ease, margin-top 0.34s ease, padding 0.34s ease;
  }
  .etiqueta-preco.visivel { max-height: 400px; margin-top: 22px; padding: 26px 26px; opacity: 1; }

  .etiqueta-preco .rotulo {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #9A968A;
    margin: 0 0 8px;
  }
  .etiqueta-preco .nome-produto {
    font-family: var(--display);
    font-size: 21px;
    font-weight: 600;
    margin: 0 0 10px;
    line-height: 1.3;
  }
  .badge-saldo {
    display: none;
    background: var(--laser);
    color: #fff;
    font-family: var(--texto);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 4px 10px;
    border-radius: 4px;
    margin-bottom: 8px;
  }
  #etiqueta.tem-desconto .badge-saldo { display: inline-block; }
  #etiqueta.tem-desconto .nome-produto { color: var(--laser); }
  .tabela-precos {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 16px;
  }
  .linha-info {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .rotulo-info {
    font-family: var(--texto);
    font-size: 13px;
    color: var(--tinta-suave);
  }
  .valor-info {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    color: var(--tinta);
  }
  #etiqueta.tem-desconto .valor-info#etiqueta-preco-original {
    text-decoration: line-through;
    color: #ADA99C;
    font-weight: 500;
  }
  #etiqueta.tem-desconto .valor-info#etiqueta-desconto {
    color: var(--laser);
    font-size: 16px;
    font-weight: 700;
  }
  .rotulo-final {
    font-family: var(--texto);
    font-size: 13px;
    font-weight: 600;
    color: var(--tinta-suave);
  }
  .etiqueta-preco .linha-preco {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-top: 1px dashed var(--linha);
    padding-top: 18px;
  }
  .etiqueta-preco .preco {
    font-family: var(--mono);
    font-size: 40px;
    font-weight: 700;
    color: var(--sucesso);
    letter-spacing: -0.01em;
  }
  .etiqueta-preco .codigo {
    display: block;
    margin-top: 10px;
    font-family: var(--mono);
    font-size: 12px;
    color: #ADA99C;
  }
  .etiqueta-preco.nao-encontrado .preco { color: var(--laser); font-size: 19px; font-family: var(--texto); font-weight: 600; }

  footer {
    margin-top: auto;
    padding-top: 34px;
    font-family: var(--texto);
    font-size: 12px;
    color: #9A968A;
    text-align: center;
    max-width: 300px;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="tela">
  <header>
    <div class="marca-icone">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 5v14M7 5v14M10 5v14M15 5v14M17 5v14M21 5v14" stroke="#F6F4EE" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <p class="eyebrow">Conferidor de Preços</p>
      <h1>Escaneie o código de barras</h1>
    </div>
  </header>

  <div class="seletor-loja">
    <div class="botao-loja" id="botao-calzedonia" data-loja="calzedonia">
      <img src="assets/logo-calzedonia-botao.png" alt="Calzedonia" />
      <span class="rotulo-loja">Calzedonia</span>
    </div>
    <div class="botao-loja" id="botao-intimissimi" data-loja="intimissimi">
      <img src="assets/logo-intimissimi-botao.png" alt="Intimissimi" />
      <span class="rotulo-loja">Intimissimi</span>
    </div>
  </div>

  <div class="status-catalogo carregando" id="status-catalogo">Selecione a loja para carregar o catálogo.</div>

  <div class="visor" id="visor">
    <div id="leitor"></div>
    <div class="moldura"></div>
    <div class="laser-linha"></div>
    <div class="estado-inicial" id="estado-inicial">
      Toque em "Escanear produto"<br />para ligar a câmera
    </div>
  </div>

  <button class="botao-principal" id="botao-escanear" disabled>Carregando catálogo...</button>

  <div class="etiqueta-preco" id="etiqueta">
    <p class="rotulo" id="etiqueta-rotulo">Produto</p>
    <span class="badge-saldo" id="badge-saldo">SALDO</span>
    <p class="nome-produto" id="etiqueta-nome">—</p>

    <div class="tabela-precos" id="tabela-precos">
      <div class="linha-info">
        <span class="rotulo-info">Preço original</span>
        <span class="valor-info" id="etiqueta-preco-original">—</span>
      </div>
      <div class="linha-info">
        <span class="rotulo-info">Desconto</span>
        <span class="valor-info" id="etiqueta-desconto">—</span>
      </div>
    </div>

    <div class="linha-preco">
      <span class="rotulo-final">Preço final</span>
      <span class="preco" id="etiqueta-preco">—</span>
    </div>
    <span class="codigo" id="etiqueta-codigo"></span>
  </div>

  <footer>Aponte a câmera diretamente para o código de barras, com boa iluminação.</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.4/dist/quagga.min.js"></script>
<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
  // Um arquivo de planilha para cada loja, na raiz do repositório.
  const PLANILHAS = {
    calzedonia: 'calzedonia.xlsx',
    intimissimi: 'intimissimi.xlsx',
  };

  const statusCatalogo = document.getElementById('status-catalogo');
  const botao = document.getElementById('botao-escanear');
  const visor = document.getElementById('visor');
  const estadoInicial = document.getElementById('estado-inicial');
  const etiqueta = document.getElementById('etiqueta');
  const elRotulo = document.getElementById('etiqueta-rotulo');
  const elNome = document.getElementById('etiqueta-nome');
  const elPrecoOriginal = document.getElementById('etiqueta-preco-original');
  const elDesconto = document.getElementById('etiqueta-desconto');
  const elPreco = document.getElementById('etiqueta-preco');
  const elCodigo = document.getElementById('etiqueta-codigo');
  const tabelaPrecos = document.getElementById('tabela-precos');
  const botoesLoja = document.querySelectorAll('.botao-loja');

  const catalogosCarregados = {}; // cache por loja, pra nao baixar de novo ao trocar
  let lojaAtual = null;
  let escaneando = false;

  function parseNumeroPreco(valor) {
    if (typeof valor === 'number') return valor;
    if (typeof valor === 'string') {
      const limpo = valor.replace(/[^\d,.-]/g, '').replace(',', '.');
      return parseFloat(limpo);
    }
    return NaN;
  }

  function parseNumeroDesconto(valor) {
    if (typeof valor === 'number') return valor;
    if (typeof valor === 'string') {
      const limpo = valor.replace(/[^\d,.-]/g, '').replace(',', '.');
      const numero = parseFloat(limpo);
      return isNaN(numero) ? 0 : numero;
    }
    return 0;
  }

  async function carregarCatalogo(loja) {
    if (catalogosCarregados[loja]) {
      ativarLoja(loja);
      return;
    }

    statusCatalogo.className = 'status-catalogo carregando';
    statusCatalogo.textContent = `Carregando catálogo da ${nomeLoja(loja)}...`;
    botao.disabled = true;
    botao.textContent = 'Carregando catálogo...';

    try {
      const resposta = await fetch(PLANILHAS[loja], { cache: 'no-store' });
      if (!resposta.ok) throw new Error('Arquivo de produtos não encontrado.');

      const buffer = await resposta.arrayBuffer();
      const workbook = XLSX.read(buffer, { type: 'array' });
      const primeiraAba = workbook.SheetNames[0];
      // le pela POSICAO da coluna (A, B, F), nao pelo nome do cabecalho,
      // pra funcionar mesmo se o texto do cabecalho mudar um pouco
      const linhas = XLSX.utils.sheet_to_json(workbook.Sheets[primeiraAba], { header: 1, defval: '' });

      const catalogo = {};
      let validos = 0;

      linhas.slice(1).forEach((linha) => { // pula a linha 1 (cabecalho)
        const codigo = linha[0];                    // Coluna A
        const descricao = linha[1];                 // Coluna B
        const tamanho = linha[4];                    // Coluna E
        const precoOriginal = parseNumeroPreco(linha[5]);  // Coluna F
        const desconto = parseNumeroDesconto(linha[6]);    // Coluna G
        const precoFinal = parseNumeroPreco(linha[7]);      // Coluna H

        if (codigo && descricao && !isNaN(precoFinal)) {
          const nome = tamanho ? `${String(descricao).trim()} — Tam. ${String(tamanho).trim()}` : String(descricao).trim();
          catalogo[String(codigo).trim()] = {
            nome,
            precoOriginal: isNaN(precoOriginal) ? precoFinal : precoOriginal,
            desconto,
            precoFinal,
          };
          validos++;
        }
      });

      catalogosCarregados[loja] = catalogo;
      statusCatalogo.className = 'status-catalogo pronto';
      statusCatalogo.textContent = `${nomeLoja(loja)} — catálogo carregado (${validos} produtos).`;
      ativarLoja(loja);
    } catch (err) {
      statusCatalogo.className = 'status-catalogo erro';
      statusCatalogo.textContent = `Não foi possível carregar o catálogo da ${nomeLoja(loja)}.`;
      botao.disabled = true;
      botao.textContent = 'Catálogo indisponível';
      console.error(err);
    }
  }

  function ativarLoja(loja) {
    lojaAtual = loja;
    botoesLoja.forEach((el) => el.classList.toggle('selecionada', el.dataset.loja === loja));
    botao.disabled = false;
    botao.textContent = 'Escanear produto';
    etiqueta.classList.remove('visivel');
  }

  function nomeLoja(loja) {
    return loja === 'calzedonia' ? 'Calzedonia' : 'Intimissimi';
  }

  botoesLoja.forEach((el) => {
    el.addEventListener('click', () => {
      if (escaneando) pararLeitura();
      carregarCatalogo(el.dataset.loja);
    });
  });

  let ultimoCodigoLido = null;
  let ultimoTimestampLeitura = 0;

  function iniciarLeitura() {
    estadoInicial.style.display = 'none';
    visor.classList.add('ativo');
    botao.textContent = 'Parar câmera';
    botao.classList.add('parar');
    escaneando = true;
    etiqueta.classList.remove('visivel', 'nao-encontrado', 'tem-desconto');

    Quagga.init({
      inputStream: {
        type: 'LiveStream',
        target: document.querySelector('#leitor'),
        constraints: {
          facingMode: 'environment',
        },
      },
      locator: {
        patchSize: 'medium',
        halfSample: true,
      },
      numOfWorkers: 2,
      frequency: 10,
      decoder: {
        readers: ['ean_reader', 'ean_8_reader', 'upc_reader', 'upc_e_reader', 'code_128_reader', 'code_39_reader'],
      },
      locate: true,
    }, (err) => {
      if (err) {
        console.error(err);
        pararLeitura();
        alert('Não foi possível acessar a câmera. Verifique se você deu permissão de câmera para o site.\n\nDetalhe técnico: ' + (err && err.message ? err.message : err));
        return;
      }
      Quagga.start();
    });

    Quagga.onDetected(aoDetectarCodigo);
  }

  function aoDetectarCodigo(resultado) {
    const codigo = resultado && resultado.codeResult && resultado.codeResult.code;
    if (!codigo) return;
    const agora = Date.now();
    // evita disparar varias vezes seguidas pro mesmo codigo em menos de 2s
    if (codigo === ultimoCodigoLido && (agora - ultimoTimestampLeitura) < 2000) return;
    ultimoCodigoLido = codigo;
    ultimoTimestampLeitura = agora;
    onCodigoLido(codigo);
  }

  function pararLeitura() {
    if (escaneando) {
      try {
        Quagga.offDetected(aoDetectarCodigo);
        Quagga.stop();
      } catch (e) { /* ignora se ja estava parado */ }
    }
    escaneando = false;
    visor.classList.remove('ativo');
    estadoInicial.style.display = 'block';
    botao.textContent = 'Escanear produto';
    botao.classList.remove('parar');
  }

  botao.addEventListener('click', () => {
    if (!lojaAtual) return;
    if (escaneando) {
      pararLeitura();
    } else {
      iniciarLeitura();
    }
  });

  function onCodigoLido(codigo) {
    pararLeitura();
    if (navigator.vibrate) navigator.vibrate(80);
    buscarProduto(codigo);
  }

  function buscarProduto(codigo) {
    const catalogo = catalogosCarregados[lojaAtual] || {};
    const produto = catalogo[String(codigo).trim()];
    etiqueta.classList.remove('nao-encontrado', 'tem-desconto');
    etiqueta.classList.add('visivel');

    if (produto) {
      elRotulo.textContent = `Produto encontrado — ${nomeLoja(lojaAtual)}`;
      elNome.textContent = produto.nome;
      elCodigo.textContent = codigo;
      tabelaPrecos.style.display = 'flex';

      const temDesconto = produto.desconto > 0 && produto.precoOriginal > produto.precoFinal;
      if (temDesconto) etiqueta.classList.add('tem-desconto');

      elPrecoOriginal.textContent = produto.precoOriginal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
      elDesconto.textContent = produto.desconto > 0 ? `-${produto.desconto.toLocaleString('pt-BR')}%` : 'Sem desconto';
      elPreco.textContent = produto.precoFinal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    } else {
      etiqueta.classList.add('nao-encontrado');
      tabelaPrecos.style.display = 'none';
      elRotulo.textContent = 'Não cadastrado';
      elNome.textContent = `Este código não foi encontrado no catálogo da ${nomeLoja(lojaAtual)}.`;
      elPreco.textContent = '';
      elCodigo.textContent = codigo;
    }
  }
</script>
</body>
</html>
